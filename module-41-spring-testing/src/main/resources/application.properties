spring.application.name=spring-testing

# H2 in-memory database for development and non-Testcontainers tests
spring.datasource.url=jdbc:h2:mem:testingdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# External pricing service base URL (overridden at test time via @DynamicPropertySource)
pricing.service.url=http://localhost:9999
