<!DOCTYPE html>
<!--
  Fragment library — defines reusable HTML blocks.

  th:fragment defines a fragment. Fragments can be:
    - Parameterless: th:fragment="nav"
    - Parameterized: th:fragment="page-head(title)"  ← like a function with arguments

  Referencing fragments:
    th:replace="~{fragments/layout :: page-head('My Title')}"
      → replaces the host element entirely with the fragment content

    th:insert="~{fragments/layout :: nav}"
      → inserts the fragment INSIDE the host element (host element is kept)

  Syntax: ~{templateName :: fragmentName(args)}
    templateName  = path relative to src/main/resources/templates/ (no .html extension)
    fragmentName  = value of th:fragment in the target template
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en">

<!--/* HEAD fragment — parameterized with page title */-->
<head th:fragment="page-head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <!--/* th:text sets element text content; the literal fallback ("Page") is for IDE preview */-->
    <title th:text="${title} + ' — Product Catalog'">Page — Product Catalog</title>
    <style>
        body      { font-family: sans-serif; max-width: 960px; margin: 0 auto; padding: 1rem; }
        nav       { background: #333; padding: 0.5rem 1rem; margin-bottom: 1.5rem; border-radius: 4px; }
        nav a     { color: #fff; margin-right: 1.2rem; text-decoration: none; }
        nav a:hover { text-decoration: underline; }
        table     { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
        th, td    { border: 1px solid #ccc; padding: 0.5rem 0.75rem; text-align: left; }
        th        { background: #f5f5f5; font-weight: 600; }
        .error    { color: #c00; font-size: 0.85rem; display: block; margin-top: 2px; }
        .field-error { border: 1px solid #c00; }
        label     { display: block; font-weight: 600; margin-top: 0.8rem; }
        input     { padding: 0.3rem 0.5rem; width: 100%; max-width: 320px; box-sizing: border-box; }
        .btn      { padding: 0.4rem 0.9rem; cursor: pointer; border-radius: 3px; font-size: 0.9rem; }
        .btn-primary { background: #0d6efd; color: #fff; border: 1px solid #0d6efd; }
        .btn-danger  { background: #dc3545; color: #fff; border: 1px solid #dc3545; }
        .actions  { display: flex; gap: 0.5rem; align-items: center; }
    </style>
</head>

<!--/* NAV fragment */-->
<nav th:fragment="nav">
    <!--/*
      @{/products} — URL expression.
      Thymeleaf prepends the application context path automatically.
      Static href is a fallback for IDE preview; th:href overrides it at runtime.
    */-->
    <a href="/products"     th:href="@{/products}">Products</a>
    <a href="/products/new" th:href="@{/products/new}">+ Add Product</a>
</nav>

<!--/* FOOTER fragment */-->
<footer th:fragment="footer">
    <hr style="margin-top:2rem"/>
    <p style="color:#888;font-size:0.85rem">Module 43 — Thymeleaf</p>
</footer>

</html>
