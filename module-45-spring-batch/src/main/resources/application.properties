spring.datasource.url=jdbc:h2:mem:batchdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop

# Create Spring Batch metadata tables (BATCH_JOB_INSTANCE, BATCH_JOB_EXECUTION,
# BATCH_STEP_EXECUTION, etc.) automatically for embedded databases
spring.batch.jdbc.initialize-schema=always

# Do NOT launch jobs automatically on application startup.
# Jobs are launched explicitly - from main() or tests.
spring.batch.job.enabled=false
