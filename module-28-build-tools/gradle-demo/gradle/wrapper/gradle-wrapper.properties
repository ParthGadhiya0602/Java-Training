# Gradle Wrapper configuration
# ════════════════════════════════════════════════════════════════════
# The wrapper downloads the declared Gradle version on first use,
# ensuring every developer and CI server uses the exact same build tool.
# Maven equivalent: .mvn/wrapper/maven-wrapper.properties
#
# Commit this file (and gradlew / gradlew.bat) to version control.
# DO NOT commit gradle/wrapper/gradle-wrapper.jar to Git — regenerate it
# with: gradle wrapper --gradle-version 8.8

distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-8.8-bin.zip
networkTimeout=10000
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
