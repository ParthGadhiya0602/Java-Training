spring.application.name=spring-boot-demo

# --- Custom typed config (app.*) ---
app.name=Java Training App
app.max-connections=50
app.feature-flags.notifications-enabled=true
app.feature-flags.analytics-enabled=false

# Database config (custom namespace -- not spring.datasource.*)
app.database.url=jdbc:h2:mem:defaultdb
app.database.pool-size=10
app.database.timeout-seconds=30

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always
management.info.env.enabled=true

# info.* props read by EnvironmentInfoContributor
info.app.name=Java Training App
info.app.version=1.0.0
info.app.description=Spring Boot training module
