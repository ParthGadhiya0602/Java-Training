# Production profile - minimal overrides; sensitive values injected as env vars.
#
# Required environment variables for production:
#   APP_ENVIRONMENT=prod
#   APP_REGION=us-east-1          (or us-central1 on GCP)
#   APP_VERSION=<release tag>
#
# Never put secrets (passwords, API keys) in this file.
# Use AWS Secrets Manager / GCP Secret Manager / HashiCorp Vault instead.
app.environment=prod
