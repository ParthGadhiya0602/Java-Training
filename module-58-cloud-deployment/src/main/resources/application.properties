# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# 12-factor Factor IX — Disposability: graceful shutdown drains in-flight requests
# before the JVM exits. Pairs with SIGTERM from the container runtime.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# ── App identity (12-factor Factor III — Config) ──────────────────────────────
# In production, override via environment variables:
#   APP_ENVIRONMENT=prod  APP_REGION=us-east-1  APP_VERSION=2.1.0
app.name=cloud-deployment-demo
app.version=1.0.0
app.environment=local
app.region=local

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Kubernetes liveness and readiness probe endpoints:
#   GET /actuator/health/liveness  → 200 while JVM is alive
#   GET /actuator/health/readiness → 200 when app is ready to serve traffic
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Expose app metadata through /actuator/info
management.info.env.enabled=true
info.app.name=${app.name}
info.app.version=${app.version}
info.app.environment=${app.environment}
