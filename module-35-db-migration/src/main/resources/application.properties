# Flyway ON by default - runs db/migration/*.sql scripts
spring.flyway.enabled=true

# Liquibase OFF by default - enabled only in LiquibaseMigrationTest
spring.liquibase.enabled=false

# H2 datasource - in-memory, Flyway-managed schema
spring.datasource.url=jdbc:h2:mem:flywaydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Show SQL for verification
spring.jdbc.template.query-timeout=10
