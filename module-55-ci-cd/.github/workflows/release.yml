name: Release

# Triggered when a tag matching semantic versioning is pushed: v1.2.3
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*" # pre-release: v1.2.3-rc.1

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest

    # Write permission to create a GitHub Release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Extract version from tag
        id: version
        # GITHUB_REF_NAME is e.g. "v1.2.3" - strip the leading "v"
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set POM version to release version
        # Removes -SNAPSHOT and sets the exact release version
        run: mvn --batch-mode versions:set -DnewVersion=${{ steps.version.outputs.VERSION }} -DgenerateBackupPoms=false

      - name: Build release artifact
        run: mvn --batch-mode package -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Attach the fat JAR to the release
          files: target/*.jar
          # Auto-generate notes from PRs and commits since the previous tag
          generate_release_notes: true
          # Mark as pre-release if tag contains a pre-release identifier
          prerelease: ${{ contains(github.ref_name, '-') }}
