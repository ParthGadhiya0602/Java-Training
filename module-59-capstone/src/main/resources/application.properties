# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:capstone;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# ── Kafka ─────────────────────────────────────────────────────────────────────
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=capstone
spring.kafka.consumer.auto-offset-reset=earliest

# ── gRPC server (InventoryServiceImpl) ────────────────────────────────────────
grpc.server.port=9090

# ── gRPC client (InventoryClient) ─────────────────────────────────────────────
inventory.grpc.host=localhost
inventory.grpc.port=9090

# ── Virtual threads (12-factor Factor VIII - Concurrency) ─────────────────────
spring.threads.virtual.enabled=true

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.prometheus.metrics.export.enabled=true

# ── Graceful shutdown ─────────────────────────────────────────────────────────
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
