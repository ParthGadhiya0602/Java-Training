# In production, load sensitive values from HashiCorp Vault via Spring Cloud Vault:
#   spring.cloud.vault.host=vault
#   spring.cloud.vault.port=8200
#   spring.cloud.vault.token=${VAULT_TOKEN}
#   spring.cloud.vault.kv.backend=secret
#   spring.cloud.vault.kv.default-context=security-demo
#
# Vault path secret/security-demo would contain:
#   jwt.secret, db.password, api.key, etc.
# Spring Cloud Vault makes these available as Spring properties automatically.
