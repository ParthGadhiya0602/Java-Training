spring.datasource.url=jdbc:h2:mem:datarestdb;DB_CLOSE_DELAY=-1
spring.jpa.hibernate.ddl-auto=create-drop

# Base path for all auto-generated Spring Data REST endpoints
spring.data.rest.base-path=/api

# Return the saved entity body on POST (201 Created) and PUT (200 OK)
# Default is false — would return just a Location header
spring.data.rest.return-body-on-create=true
spring.data.rest.return-body-on-update=true

# Default number of items per page for collection resources
spring.data.rest.default-page-size=20
