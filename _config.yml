title: "Java Training"
description: "Beginner to Production-Ready — 59 modules covering core Java through cloud deployment."

url: "https://parthgadhiya0602.github.io"
baseurl: "/Java-Training"

remote_theme: just-the-docs/just-the-docs@v0.10.0

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag

# ── Site identity ──────────────────────────────────────────────────────────────
logo: "/assets/images/logo.png" # optional: add a logo to assets/images/

aux_links:
  "GitHub":
    - "https://github.com/ParthGadhiya0602/Java-Training"
aux_links_new_tab: true

# ── Edit / source links on every page ─────────────────────────────────────────
gh_edit_link: true
gh_edit_link_text: "Edit this page"
gh_edit_repository: "https://github.com/ParthGadhiya0602/Java-Training"
gh_edit_branch: "main"
gh_edit_view_mode: "tree"

# ── Search ─────────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 3
  previews: 3

# ── Navigation ─────────────────────────────────────────────────────────────────
nav_sort: order # order by nav_order front-matter field
nav_external_links:
  - title: Java 21 Docs
    url: https://docs.oracle.com/en/java/javase/21/docs/api/
  - title: Parth Gadhiya
    url: https://github.com/ParthGadhiya0602

# ── Colour scheme ──────────────────────────────────────────────────────────────
color_scheme: light # light | dark

# ── Footer ─────────────────────────────────────────────────────────────────────
footer_content: 'Java Training &mdash; 59 modules, beginner to production-ready. Built by <a href="https://github.com/ParthGadhiya0602">Parth Gadhiya</a>'

# ── Callouts (used for tip/warning blocks) ─────────────────────────────────────
callouts_level: loud
callouts:
  note:
    title: Note
    color: blue
  tip:
    title: Tip
    color: green
  warning:
    title: Warning
    color: yellow

# ── Markdown ───────────────────────────────────────────────────────────────────
markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge

# ── Exclude from build ─────────────────────────────────────────────────────────
exclude:
  - "*/target/"
  - "*/pom.xml"
  - "*/src/"
  - Gemfile
  - Gemfile.lock
  - "*.sh"
